server.port=8080
# 决定后端的容器端口

# 指定日志文件路径。这里设为相对路径，日志会相对于运行目录（即容器内的 /app）生成。
# 如果使用绝对路径，请确保目录存在且有写入权限。
# 为什么是 ./logs？ 因为你的 Dockerfile 中设置了 WORKDIR /app，所以应用运行在 /app 目录下。设置相对路径 ./logs，日志就会写入 /app/logs/ 目录中 。
logging.file.path=./logs/

# ZhiPuAI
# TODO: 填入你自己的 API Key
spring.ai.zhipuai.api-key=YOUR_ZHIPU_API_KEY
# 如果模型名有更新，直接改这里即可（示例: glm-4-flash-250414）
spring.ai.zhipuai.chat.options.model=glm-4-flash
