version: '3.8'

services:
  backend:
    build:
      context: ./backend   # 后端项目路径（根据实际情况修改）
      dockerfile: Dockerfile
    container_name: spring-backend
    ports:
      - "8091:8080"    # 将宿主机 8091 端口映射到容器内的 8080端口
    environment:
      - SPRING_PROFILES_ACTIVE=docker   # 如有需要
    networks:
      - app-network
    volumes:
      # 格式: 宿主机路径:容器内路径;将宿主机当前目录下的 ./backend-logs 文件夹，挂载到容器内的 /app/logs 文件夹
      - /Users/a1-6/project/logs:/app/logs

  front-project:
    build:
      context: ./front-project   # 前端项目路径（vite-project 所在目录）
      dockerfile: Dockerfile
    container_name: front-frontend
    ports:
      - "8090:8080"  # 将宿主机 8090 端口映射到容器内的 8080端口
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

