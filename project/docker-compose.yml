version: '3.8'

services:
  backend:
    build:
      context: ./backend   # 后端项目路径（根据实际情况修改）
      dockerfile: Dockerfile
    container_name: spring-backend
    ports:
      - "7776:7776"         # 可选：如果需要从宿主机直接访问后端，映射端口
    environment:
      - SPRING_PROFILES_ACTIVE=docker   # 如有需要
    networks:
      - app-network
    volumes:
      # 格式: 宿主机路径:容器内路径;将宿主机当前目录下的 ./backend-logs 文件夹，挂载到容器内的 /app/logs 文件夹
      - /Users/a1-6/project/logs:/app/logs

  vite-project:
    build:
      context: ./vite-project   # 前端项目路径（vite-project 所在目录）
      dockerfile: Dockerfile
    container_name: vite-frontend
    ports:
      - "7777:80"           # 将宿主机 7777 端口映射到容器内的 80 端口
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

